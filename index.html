<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLV Arrivals & Departures</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.svg" />
    <style>
      :root {
        --bg: #f4f8ff;
        --surface: #ffffff;
        --surface-2: #edf3ff;
        --text: #0b2c6f;
        --muted: #4c6294;
        --brand: #003b8f;
        --brand-2: #0057d8;
        --accent: #f4c430;
        --ok: #0f9d58;
        --warn: #e57a00;
        --border: #c8d8f5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: var(--text);
        background: radial-gradient(circle at top right, #dbe9ff 0%, #f7fbff 35%, #f4f8ff 100%);
      }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 40px; }
      .top {
        display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
        background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 65%, #1976ff 100%);
        color: #fff; border-radius: 16px; padding: 18px;
        box-shadow: 0 10px 24px rgba(0, 59, 143, 0.22);
      }
      h1 { margin: 0 0 6px 0; font-size: 1.5rem; }
      .meta { color: #e6efff; font-size: .95rem; }
      .submeta { color: #dbe7ff; font-size: .85rem; margin-top: 4px; }
      .btn {
        background: var(--accent); color: #001c49; border: 0; font-weight: 800;
        padding: 10px 14px; border-radius: 10px; cursor: pointer;
      }
      .btn:disabled { opacity: .65; cursor: not-allowed; }
      .controls {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .control {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        color: var(--text);
      }
      .cards {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .day-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px;
        box-shadow: 0 6px 16px rgba(0, 59, 143, 0.08);
      }
      .day-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; }
      .day { font-size: 1.03rem; font-weight: 800; }
      .small { font-size: .8rem; color: var(--muted); }
      .grid2 { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      @media (max-width: 700px) {
        .grid2 { grid-template-columns: 1fr; }
      }
      .metric { background: var(--surface-2); border: 1px solid #d7e4fb; border-radius: 10px; padding: 10px; }
      .label { color: var(--muted); font-size: .8rem; margin-bottom: 4px; }
      .value { font-weight: 700; font-size: 1rem; }
      .ok { color: var(--ok); }
      .planned { color: var(--warn); }
      .metric .value + .value { margin-top: 2px; }
      .open-btn {
        margin-top: 10px; width: 100%; border: 1px solid #c0d3fb; background: #f4f8ff; color: var(--brand);
        font-weight: 700; border-radius: 10px; padding: 9px; cursor: pointer;
      }
      .open-btn:focus, .btn:focus, .control:focus {
        outline: 3px solid rgba(0, 87, 216, 0.25);
        outline-offset: 1px;
      }
      .err { margin-top: 12px; background: #ffe9e9; border: 1px solid #ffc3c3; color: #9b1e1e; padding: 10px; border-radius: 10px; }

      .panel {
        margin-top: 10px; padding: 10px; border: 1px solid #d8e5ff; border-radius: 10px; background: #fbfdff;
      }
      .panel h4 { margin: 4px 0 8px 0; color: var(--brand); }
      table { width: 100%; border-collapse: collapse; font-size: .85rem; }
      th, td { border-bottom: 1px solid #e3ecff; padding: 6px 4px; text-align: left; white-space: nowrap; }
      th { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
      td.route { font-weight: 700; color: #123a84; }
      .chip {
        display: inline-block; padding: 2px 7px; border-radius: 999px; font-weight: 700; font-size: .73rem;
        background: #dff5e8; color: #0d7c45;
      }
      .track-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid #c0d3fb;
        background: #f4f8ff;
        color: var(--brand);
        text-decoration: none;
        font-size: 1rem;
      }
      .track-link:hover { background: #e8f1ff; }
      .narrow { overflow-x: auto; }
      .footer-note {
        margin-top: 18px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f8fbff;
        color: var(--muted);
        font-size: .84rem;
        line-height: 1.45;
      }
      .footer-note a { color: var(--brand); font-weight: 700; }
      .lang-toggle {
        margin-left: 8px;
      }
      html[lang="he"] body {
        direction: rtl;
      }
      html[lang="he"] .top,
      html[lang="he"] .controls,
      html[lang="he"] .day-head {
        direction: rtl;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <div>
          <h1>TLV Arrivals & Departures</h1>
          <div id="meta" class="meta">Loading...</div>
        </div>
        <div>
          <button id="langToggleBtn" class="btn lang-toggle" aria-label="Switch language">עברית</button>
          <button id="refreshBtn" class="btn">Refresh now</button>
        </div>
      </div>
      <div class="controls">
        <label for="dayFilter" class="small" style="font-weight:700;">Filter day</label>
        <select id="dayFilter" class="control" aria-label="Filter by day"></select>
        <label for="sortOrder" class="small" style="font-weight:700;">Sort</label>
        <select id="sortOrder" class="control" aria-label="Sort days">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </div>

      <div class="controls" style="margin-top:10px;">
        <label for="flightSearch" class="small" style="font-weight:700;">Filter Flight / Airline</label>
        <input id="flightSearch" class="control" type="text" placeholder="e.g. LY827, El Al" aria-label="Filter by flight number or airline" />
        <button id="searchBtn" class="btn" style="padding:8px 12px;">Search</button>
      </div>
      <div id="searchResults" class="day-card" style="display:none; margin-top:12px;"></div>

      <div id="cards" class="cards" role="list" aria-live="polite"></div>

      <footer class="footer-note">
        <div>
          Data source: <a href="https://aviation-edge.com/" target="_blank" rel="noopener noreferrer">Aviation Edge API</a>. Aviation Edge fetches and aggregates flight schedule/status data from airport systems and airline/ATC feeds.
        </div>
        <div style="margin-top:6px;">
          Flight tracking links use <a href="https://www.flightradar24.com/" target="_blank" rel="noopener noreferrer">Flightradar24</a> for flight pages and live tracking context.
        </div>
      </footer>
    </div>

    <script>
      const dataUrl = './data/flights.json';
      const refreshEndpoint = window.REFRESH_ENDPOINT || 'https://avi-tlv-refresh-worker.baronclaw.workers.dev/api/refresh';

      const cardsEl = document.getElementById('cards');
      const metaEl = document.getElementById('meta');
      const refreshBtn = document.getElementById('refreshBtn');
      const langToggleBtn = document.getElementById('langToggleBtn');
      const dayFilterEl = document.getElementById('dayFilter');
      const sortOrderEl = document.getElementById('sortOrder');
      const flightSearchEl = document.getElementById('flightSearch');
      const searchBtnEl = document.getElementById('searchBtn');
      const searchResultsEl = document.getElementById('searchResults');
      let payloadCache = null;
      const openDays = new Set();
      const I18N = {
        en: {
          htmlLang: 'en',
          dir: 'ltr',
          toggle: 'עברית',
          title: 'TLV Arrivals & Departures',
          loading: 'Loading...',
          refreshNow: 'Refresh now',
          refreshing: 'Refreshing...',
          refreshed: 'Refreshed!',
          filterDay: 'Filter day',
          allDays: 'All days',
          sort: 'Sort',
          newestFirst: 'Newest first',
          oldestFirst: 'Oldest first',
          filterFlightAirline: 'Filter Flight / Airline',
          searchPlaceholder: 'e.g. LY827, El Al',
          search: 'Search',
          dataSource: 'Data source:',
          dataSourceDesc: 'Aviation Edge fetches and aggregates flight schedule/status data from airport systems and airline/ATC feeds.',
          trackingDesc: 'Flight tracking links use Flightradar24 for flight pages and live tracking context.',
          completed: 'Completed',
          inProgress: 'In progress',
          planned: 'Planned',
          arrivals: 'Arrivals',
          departures: 'Departures',
          hideDetails: 'Hide details',
          showDetails: 'Show flight details',
          arrivalsCompletedExamples: 'Arrivals, completed examples',
          departuresCompletedExamples: 'Departures, completed examples',
          departuresInProgressExamples: 'Departures, in progress examples',
          departuresPlannedExamples: 'Departures, planned examples',
          noExamples: 'No examples for this bucket.',
          flight: 'Flight',
          airline: 'Airline',
          route: 'Route',
          status: 'Status',
          schedArr: 'Sched Arr',
          schedDep: 'Sched Dep',
          actualArr: 'Actual Arr',
          actualDep: 'Actual Dep',
          track: 'Track',
          unknown: 'unknown',
          inProgressStatus: 'in progress',
          notFound: 'NOT FOUND',
          noMatch: 'No flight or airline matched',
          foundN: (n) => `Found ${n}`,
          resultsFor: (q) => `result(s) for "${q}"`,
          matches: (n) => `${n} match(es)`,
          type: 'Type',
          scheduled: 'Scheduled',
          failedLoad: 'Failed to load data',
          noDataForFilter: 'No data for selected filter.',
          airportUpdated: (airport, generated, dayCount) => `Airport ${airport} • Updated ${generated} • ${dayCount} days`,
          endpointModes: (arr, dep) => `arr: ${arr} • dep: ${dep}`,
          arrivalError: (e) => `Arrival error: ${e}`,
          departureError: (e) => `Departure error: ${e}`
        },
        he: {
          htmlLang: 'he',
          dir: 'rtl',
          toggle: 'English (USA)',
          title: 'נחיתות והמראות ב-TLV',
          loading: 'טוען...',
          refreshNow: 'רענון עכשיו',
          refreshing: 'מרענן...',
          refreshed: 'רוענן!',
          filterDay: 'סינון יום',
          allDays: 'כל הימים',
          sort: 'מיון',
          newestFirst: 'החדש ביותר קודם',
          oldestFirst: 'הישן ביותר קודם',
          filterFlightAirline: 'סינון טיסה / חברת תעופה',
          searchPlaceholder: 'לדוגמה: LY827, El Al',
          search: 'חיפוש',
          dataSource: 'מקור הנתונים:',
          dataSourceDesc: 'Aviation Edge אוסף ומאגד נתוני לוחות זמנים וסטטוס טיסות ממערכות שדות תעופה ומקורות חברות תעופה/פיקוח אווירי.',
          trackingDesc: 'קישורי המעקב משתמשים ב-Flightradar24 לעמודי טיסה והקשר מעקב חי.',
          completed: 'הושלמו',
          inProgress: 'בתהליך',
          planned: 'מתוכננות',
          arrivals: 'נחיתות',
          departures: 'המראות',
          hideDetails: 'הסתר פרטים',
          showDetails: 'הצג פרטי טיסה',
          arrivalsCompletedExamples: 'נחיתות, דוגמאות שהושלמו',
          departuresCompletedExamples: 'המראות, דוגמאות שהושלמו',
          departuresInProgressExamples: 'המראות, דוגמאות בתהליך',
          departuresPlannedExamples: 'המראות, דוגמאות מתוכננות',
          noExamples: 'אין דוגמאות בקטגוריה זו.',
          flight: 'טיסה',
          airline: 'חברת תעופה',
          route: 'מסלול',
          status: 'סטטוס',
          schedArr: 'נחיתה מתוכננת',
          schedDep: 'המראה מתוכננת',
          actualArr: 'נחיתה בפועל',
          actualDep: 'המראה בפועל',
          track: 'מעקב',
          unknown: 'לא ידוע',
          inProgressStatus: 'בתהליך',
          notFound: 'לא נמצא',
          noMatch: 'לא נמצאה טיסה או חברת תעופה שתואמת ל',
          foundN: (n) => `נמצאו ${n}`,
          resultsFor: (q) => `תוצאה/ות עבור "${q}"`,
          matches: (n) => `${n} התאמה/ות`,
          type: 'סוג',
          scheduled: 'מתוכנן',
          failedLoad: 'טעינת הנתונים נכשלה',
          noDataForFilter: 'אין נתונים עבור הסינון שנבחר.',
          airportUpdated: (airport, generated, dayCount) => `שדה תעופה ${airport} • עודכן ${generated} • ${dayCount} ימים`,
          endpointModes: (arr, dep) => `נחיתות: ${arr} • המראות: ${dep}`,
          arrivalError: (e) => `שגיאת נחיתות: ${e}`,
          departureError: (e) => `שגיאת המראות: ${e}`
        }
      };
      let currentLang = localStorage.getItem('tlv_lang') === 'he' ? 'he' : 'en';
      const t = (key, ...args) => {
        const v = I18N[currentLang][key];
        return typeof v === 'function' ? v(...args) : v;
      };

      function applyLang() {
        const htmlEl = document.documentElement;
        htmlEl.lang = I18N[currentLang].htmlLang;
        htmlEl.dir = I18N[currentLang].dir;

        document.querySelector('h1').textContent = t('title');
        if (!payloadCache) metaEl.textContent = t('loading');

        refreshBtn.textContent = refreshBtn.disabled ? t('refreshing') : t('refreshNow');
        langToggleBtn.textContent = t('toggle');

        const labels = document.querySelectorAll('label');
        if (labels[0]) labels[0].textContent = t('filterDay');
        if (labels[1]) labels[1].textContent = t('sort');
        if (labels[2]) labels[2].textContent = t('filterFlightAirline');

        const dayAll = dayFilterEl.querySelector('option[value="all"]');
        if (dayAll) dayAll.textContent = t('allDays');

        if (sortOrderEl.options[0]) sortOrderEl.options[0].textContent = t('newestFirst');
        if (sortOrderEl.options[1]) sortOrderEl.options[1].textContent = t('oldestFirst');

        flightSearchEl.placeholder = t('searchPlaceholder');
        searchBtnEl.textContent = t('search');

        const footer = document.querySelector('.footer-note');
        if (footer) {
          const rows = footer.querySelectorAll('div');
          if (rows[0]) rows[0].childNodes[0].textContent = `${t('dataSource')} `;
          if (rows[0]) rows[0].childNodes[2].textContent = ` ${t('dataSourceDesc')}`;
          if (rows[1]) rows[1].childNodes[0].textContent = t('trackingDesc');
        }
      }

      const fmtDay = (iso) => {
        const d = new Date(iso + 'T00:00:00Z');
        return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      };
      const fmtTime = (s) => s ? s.replace('.000', '') : 'n/a';
      const humanStatus = (s) => {
        const v = String(s || 'unknown').toLowerCase();
        if (v === 'active') return t('inProgressStatus');
        if (v === 'unknown') return t('unknown');
        return v;
      };

      function metric(title, completed, inProgress, planned) {
        return `<div class="metric"><div class="label">${title}</div><div class="value ok">${t('completed')}: ${completed ?? 0}</div><div class="value">${t('inProgress')}: ${inProgress ?? 0}</div><div class="value planned">${t('planned')}: ${planned ?? 0}</div></div>`;
      }

      function flightRadarUrl(flight) {
        const clean = String(flight || '').trim();
        if (!clean) return 'https://www.flightradar24.com/';
        return `https://www.flightradar24.com/data/flights/${encodeURIComponent(clean.toLowerCase())}`;
      }

      function rows(items = [], type = 'arrival') {
        if (!items.length) return `<div class="small">${t('noExamples')}</div>`;
        const body = items.map(it => `<tr>
            <td>${it.flight || 'n/a'}</td>
            <td>${it.airline || 'n/a'}</td>
            <td class="route">${it.dep || '---'} → ${it.arr || '---'}</td>
            <td><span class="chip">${humanStatus(it.status)}</span></td>
            <td>${fmtTime(type === 'arrival' ? it.scheduled_arr : it.scheduled_dep)}</td>
            <td>${fmtTime(type === 'arrival' ? it.actual_arr : it.actual_dep)}</td>
            <td>
              <a
                class="track-link"
                href="${flightRadarUrl(it.flight)}"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Track ${it.flight || 'flight'} on Flightradar24"
                title="Track on Flightradar24"
              >✈️</a>
            </td>
          </tr>`).join('');
        return `<div class="narrow"><table><thead><tr><th>${t('flight')}</th><th>${t('airline')}</th><th>${t('route')}</th><th>${t('status')}</th><th>${type === 'arrival' ? t('schedArr') : t('schedDep')}</th><th>${type === 'arrival' ? t('actualArr') : t('actualDep')}</th><th>${t('track')}</th></tr></thead><tbody>${body}</tbody></table></div>`;
      }

      function normalizeCounts(summary = {}, kind = 'departure') {
        const raw = summary?.counts || {};
        const statusCounts = summary?.status_counts || {};
        const completedExamples = summary?.completed_examples || [];

        if (raw.in_progress != null) {
          return {
            completed: raw.completed ?? 0,
            in_progress: raw.in_progress ?? 0,
            planned: raw.planned ?? 0,
          };
        }

        // Backward-compat with older data files where "active" was folded into completed
        if (kind === 'departure') {
          const active = statusCounts.active ?? 0;
          const completedActiveRows = completedExamples.filter(x => (x?.status || '').toLowerCase() === 'active').length;
          const inferredInProgress = Math.max(active, completedActiveRows);
          return {
            completed: Math.max(0, (raw.completed ?? 0) - inferredInProgress),
            in_progress: inferredInProgress,
            planned: raw.planned ?? 0,
          };
        }

        return {
          completed: raw.completed ?? 0,
          in_progress: raw.in_progress ?? 0,
          planned: raw.planned ?? 0,
        };
      }

      function sanitizeSearchInput(value) {
        return String(value || '')
          .trim()
          .slice(0, 80)
          .replace(/[<>`"'\\;(){}]/g, ' ')
          .replace(/\s+/g, ' ')
          .toLowerCase();
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function detailsPanel(dayData) {
        const arrDone = dayData?.arrival?.summary?.completed_examples || [];

        const depSummary = dayData?.departure?.summary || {};
        const depDoneRaw = depSummary?.completed_examples || [];
        const depActiveRaw = depSummary?.in_progress_examples || [];
        const depPlanned = depSummary?.planned_examples || [];

        // Backward-compat split for older payloads
        const depDone = depActiveRaw.length
          ? depDoneRaw
          : depDoneRaw.filter(x => (x?.status || '').toLowerCase() !== 'active');
        const depActive = depActiveRaw.length
          ? depActiveRaw
          : depDoneRaw.filter(x => (x?.status || '').toLowerCase() === 'active');

        return `<div class="panel">
          <h4>${t('arrivalsCompletedExamples')}</h4>
          ${rows(arrDone, 'arrival')}
          <h4 style="margin-top:12px;">${t('departuresCompletedExamples')}</h4>
          ${rows(depDone, 'departure')}
          <h4 style="margin-top:12px;">${t('departuresInProgressExamples')}</h4>
          ${rows(depActive, 'departure')}
          <h4 style="margin-top:12px;">${t('departuresPlannedExamples')}</h4>
          ${rows(depPlanned, 'departure')}
        </div>`;
      }

      function refreshFilterOptions(days) {
        const current = dayFilterEl.value || 'all';
        dayFilterEl.innerHTML = `<option value="all">${t('allDays')}</option>` +
          days.map(d => `<option value="${d}">${fmtDay(d)} (${d})</option>`).join('');
        dayFilterEl.value = days.includes(current) ? current : 'all';
      }

      function render(payload) {
        payloadCache = payload;
        const generated = payload.generated_at ? new Date(payload.generated_at).toLocaleString() : 'not generated yet';
        const dayCount = Object.keys(payload.days || {}).length;
        metaEl.textContent = t('airportUpdated', payload.airport || 'TLV', generated, dayCount);

        const sortedDays = Object.keys(payload.days || {}).sort();
        const order = sortOrderEl.value || 'desc';
        const days = order === 'asc' ? sortedDays : [...sortedDays].reverse();
        refreshFilterOptions(days);

        const filter = dayFilterEl.value || 'all';
        const visibleDays = filter === 'all' ? days : days.filter(d => d === filter);

        if (!visibleDays.length) {
          cardsEl.innerHTML = `<div class="day-card">${t('noDataForFilter')}</div>`;
          return;
        }

        cardsEl.innerHTML = visibleDays.map(day => {
          const dayData = payload.days[day] || {};
          const arr = dayData.arrival || {};
          const dep = dayData.departure || {};
          const arrS = arr.summary || {};
          const depS = dep.summary || {};
          const arrC = normalizeCounts(arrS, 'arrival');
          const depC = normalizeCounts(depS, 'departure');
          const arrErr = arrS.error ? `<div class="err">${t('arrivalError', arrS.error)}</div>` : '';
          const depErr = depS.error ? `<div class="err">${t('departureError', depS.error)}</div>` : '';
          const isOpen = openDays.has(day);

          return `<section class="day-card" data-day="${day}" role="listitem">
            <div class="day-head">
              <div class="day">${fmtDay(day)} <span class="small">(${day})</span></div>
              <div class="small">${t('endpointModes', arr.endpoint_mode || '-', dep.endpoint_mode || '-')}</div>
            </div>
            <div class="grid2">
              ${metric(t('arrivals'), arrC.completed, arrC.in_progress, arrC.planned)}
              ${metric(t('departures'), depC.completed, depC.in_progress, depC.planned)}
            </div>
            <button class="open-btn" data-open-day="${day}">${isOpen ? t('hideDetails') : t('showDetails')}</button>
            ${isOpen ? detailsPanel(dayData) : ''}
            ${arrErr}${depErr}
          </section>`;
        }).join('');

        document.querySelectorAll('[data-open-day]').forEach(btn => {
          btn.addEventListener('click', () => {
            const day = btn.getAttribute('data-open-day');
            if (openDays.has(day)) openDays.delete(day); else openDays.add(day);
            render(payloadCache);
          });
        });
      }

      function collectSearchRows(payload) {
        const out = [];
        for (const [day, dayData] of Object.entries(payload?.days || {})) {
          for (const type of ['arrival', 'departure']) {
            const summary = dayData?.[type]?.summary || {};
            for (const bucket of ['completed_examples', 'in_progress_examples', 'planned_examples']) {
              for (const row of summary?.[bucket] || []) {
                out.push({ day, type, bucket, row });
              }
            }
          }
        }
        return out;
      }

      function runSearch() {
        if (!payloadCache) return;
        const qRaw = flightSearchEl.value || '';
        const q = sanitizeSearchInput(qRaw);

        if (!q) {
          searchResultsEl.style.display = 'none';
          searchResultsEl.innerHTML = '';
          return;
        }

        const allRows = collectSearchRows(payloadCache);
        const matches = allRows.filter(({ row }) => {
          const flight = String(row?.flight || '').toLowerCase();
          const airline = String(row?.airline || '').toLowerCase();
          return flight.includes(q) || airline.includes(q);
        });

        const byDay = new Map();
        for (const m of matches) {
          if (!byDay.has(m.day)) byDay.set(m.day, []);
          byDay.get(m.day).push(m);
        }

        if (!matches.length) {
          searchResultsEl.style.display = 'block';
          searchResultsEl.innerHTML = `<div class="day"><strong>${t('notFound')}</strong></div><div class="small" style="margin-top:6px;">${t('noMatch')} "${escapeHtml(qRaw)}"</div>`;
          return;
        }

        const sections = Array.from(byDay.entries())
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(([day, rowsForDay]) => {
            const body = rowsForDay.map(({ type, row }) => `<tr>
              <td>${escapeHtml(row.flight || 'n/a')}</td>
              <td>${escapeHtml(row.airline || 'n/a')}</td>
              <td>${escapeHtml(type)}</td>
              <td>${escapeHtml(humanStatus(row.status || 'unknown'))}</td>
              <td>${escapeHtml((row.dep || '---') + ' → ' + (row.arr || '---'))}</td>
              <td>${escapeHtml(type === 'arrival' ? (row.scheduled_arr || 'n/a') : (row.scheduled_dep || 'n/a'))}</td>
              <td><a class="track-link" href="${flightRadarUrl(row.flight)}" target="_blank" rel="noopener noreferrer" title="Track on Flightradar24">✈️</a></td>
            </tr>`).join('');
            return `<h4 style="margin:10px 0 6px 0;">${escapeHtml(day)} • ${t('matches', rowsForDay.length)}</h4>
              <div class="narrow"><table><thead><tr><th>${t('flight')}</th><th>${t('airline')}</th><th>${t('type')}</th><th>${t('status')}</th><th>${t('route')}</th><th>${t('scheduled')}</th><th>${t('track')}</th></tr></thead><tbody>${body}</tbody></table></div>`;
          }).join('');

        searchResultsEl.style.display = 'block';
        searchResultsEl.innerHTML = `<div class="day"><strong>${t('foundN', matches.length)}</strong> ${t('resultsFor', escapeHtml(qRaw))}</div>${sections}`;
      }

      async function loadData() {
        const res = await fetch(dataUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error(`failed to load data (${res.status})`);
        render(await res.json());
      }

      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      async function refreshData() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = t('refreshing');
        try {
          const res = await fetch(refreshEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from: 'web' })
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || `refresh failed (${res.status})`);

          refreshBtn.textContent = t('refreshed');
          await loadData().catch(() => {});
          await sleep(5000);
        } catch (e) {
          alert(e.message || 'refresh failed');
        } finally {
          refreshBtn.disabled = false;
          refreshBtn.textContent = t('refreshNow');
        }
      }

      refreshBtn.addEventListener('click', refreshData);
      langToggleBtn.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'he' : 'en';
        localStorage.setItem('tlv_lang', currentLang);
        applyLang();
        if (payloadCache) render(payloadCache);
        runSearch();
      });
      dayFilterEl.addEventListener('change', () => payloadCache && render(payloadCache));
      sortOrderEl.addEventListener('change', () => payloadCache && render(payloadCache));
      searchBtnEl.addEventListener('click', runSearch);
      flightSearchEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          runSearch();
        }
      });

      applyLang();
      loadData().catch(err => {
        metaEl.textContent = t('failedLoad');
        cardsEl.innerHTML = `<div class="day-card err">${err.message}</div>`;
      });
    </script>
  </body>
</html>
