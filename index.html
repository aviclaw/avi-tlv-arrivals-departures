<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLV Arrivals & Departures</title>
    <style>
      :root {
        --bg: #f4f8ff;
        --surface: #ffffff;
        --surface-2: #edf3ff;
        --text: #0b2c6f;
        --muted: #4c6294;
        --brand: #003b8f;
        --brand-2: #0057d8;
        --accent: #f4c430;
        --ok: #0f9d58;
        --warn: #e57a00;
        --border: #c8d8f5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: var(--text);
        background: radial-gradient(circle at top right, #dbe9ff 0%, #f7fbff 35%, #f4f8ff 100%);
      }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 40px; }
      .top {
        display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
        background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 65%, #1976ff 100%);
        color: #fff; border-radius: 16px; padding: 18px;
        box-shadow: 0 10px 24px rgba(0, 59, 143, 0.22);
      }
      h1 { margin: 0 0 6px 0; font-size: 1.5rem; }
      .meta { color: #e6efff; font-size: .95rem; }
      .submeta { color: #dbe7ff; font-size: .85rem; margin-top: 4px; }
      .btn {
        background: var(--accent); color: #001c49; border: 0; font-weight: 800;
        padding: 10px 14px; border-radius: 10px; cursor: pointer;
      }
      .btn:disabled { opacity: .65; cursor: not-allowed; }
      .controls {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .control {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        color: var(--text);
      }
      .cards {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .day-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px;
        box-shadow: 0 6px 16px rgba(0, 59, 143, 0.08);
      }
      .day-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; }
      .day { font-size: 1.03rem; font-weight: 800; }
      .small { font-size: .8rem; color: var(--muted); }
      .grid2 { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      @media (max-width: 700px) {
        .grid2 { grid-template-columns: 1fr; }
      }
      .metric { background: var(--surface-2); border: 1px solid #d7e4fb; border-radius: 10px; padding: 10px; }
      .label { color: var(--muted); font-size: .8rem; margin-bottom: 4px; }
      .value { font-weight: 700; font-size: 1rem; }
      .ok { color: var(--ok); }
      .planned { color: var(--warn); }
      .metric .value + .value { margin-top: 2px; }
      .open-btn {
        margin-top: 10px; width: 100%; border: 1px solid #c0d3fb; background: #f4f8ff; color: var(--brand);
        font-weight: 700; border-radius: 10px; padding: 9px; cursor: pointer;
      }
      .open-btn:focus, .btn:focus, .control:focus {
        outline: 3px solid rgba(0, 87, 216, 0.25);
        outline-offset: 1px;
      }
      .err { margin-top: 12px; background: #ffe9e9; border: 1px solid #ffc3c3; color: #9b1e1e; padding: 10px; border-radius: 10px; }

      .panel {
        margin-top: 10px; padding: 10px; border: 1px solid #d8e5ff; border-radius: 10px; background: #fbfdff;
      }
      .panel h4 { margin: 4px 0 8px 0; color: var(--brand); }
      table { width: 100%; border-collapse: collapse; font-size: .85rem; }
      th, td { border-bottom: 1px solid #e3ecff; padding: 6px 4px; text-align: left; white-space: nowrap; }
      th { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
      td.route { font-weight: 700; color: #123a84; }
      .chip {
        display: inline-block; padding: 2px 7px; border-radius: 999px; font-weight: 700; font-size: .73rem;
        background: #dff5e8; color: #0d7c45;
      }
      .track-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid #c0d3fb;
        background: #f4f8ff;
        color: var(--brand);
        text-decoration: none;
        font-size: 1rem;
      }
      .track-link:hover { background: #e8f1ff; }
      .narrow { overflow-x: auto; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <div>
          <h1>TLV Arrivals & Departures</h1>
          <div id="meta" class="meta">Loading...</div>
        </div>
        <button id="refreshBtn" class="btn">Refresh now</button>
      </div>
      <div class="controls">
        <label for="dayFilter" class="small" style="font-weight:700;">Filter day</label>
        <select id="dayFilter" class="control" aria-label="Filter by day"></select>
        <label for="sortOrder" class="small" style="font-weight:700;">Sort</label>
        <select id="sortOrder" class="control" aria-label="Sort days">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </div>

      <div class="controls" style="margin-top:10px;">
        <label for="flightSearch" class="small" style="font-weight:700;">Filter Flight / Airline</label>
        <input id="flightSearch" class="control" type="text" placeholder="e.g. LY827, El Al" aria-label="Filter by flight number or airline" />
        <button id="searchBtn" class="btn" style="padding:8px 12px;">Search</button>
      </div>
      <div id="searchResults" class="day-card" style="display:none; margin-top:12px;"></div>

      <div id="cards" class="cards" role="list" aria-live="polite"></div>
    </div>

    <script>
      const dataUrl = './data/flights.json';
      const refreshEndpoint = window.REFRESH_ENDPOINT || 'https://avi-tlv-refresh-worker.baronclaw.workers.dev/api/refresh';

      const cardsEl = document.getElementById('cards');
      const metaEl = document.getElementById('meta');
      const refreshBtn = document.getElementById('refreshBtn');
      const dayFilterEl = document.getElementById('dayFilter');
      const sortOrderEl = document.getElementById('sortOrder');
      const flightSearchEl = document.getElementById('flightSearch');
      const searchBtnEl = document.getElementById('searchBtn');
      const searchResultsEl = document.getElementById('searchResults');
      let payloadCache = null;
      const openDays = new Set();

      const fmtDay = (iso) => {
        const d = new Date(iso + 'T00:00:00Z');
        return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      };
      const fmtTime = (s) => s ? s.replace('.000', '') : 'n/a';
      const humanStatus = (s) => {
        const v = String(s || 'unknown').toLowerCase();
        if (v === 'active') return 'in progress';
        return v;
      };

      function metric(title, completed, inProgress, planned) {
        return `<div class="metric"><div class="label">${title}</div><div class="value ok">Completed: ${completed ?? 0}</div><div class="value">In progress: ${inProgress ?? 0}</div><div class="value planned">Planned: ${planned ?? 0}</div></div>`;
      }

      function flightRadarUrl(flight) {
        const clean = String(flight || '').trim();
        if (!clean) return 'https://www.flightradar24.com/';
        return `https://www.flightradar24.com/data/flights/${encodeURIComponent(clean.toLowerCase())}`;
      }

      function rows(items = [], type = 'arrival') {
        if (!items.length) return '<div class="small">No examples for this bucket.</div>';
        const body = items.map(it => `<tr>
            <td>${it.flight || 'n/a'}</td>
            <td>${it.airline || 'n/a'}</td>
            <td class="route">${it.dep || '---'} → ${it.arr || '---'}</td>
            <td><span class="chip">${humanStatus(it.status)}</span></td>
            <td>${fmtTime(type === 'arrival' ? it.scheduled_arr : it.scheduled_dep)}</td>
            <td>${fmtTime(type === 'arrival' ? it.actual_arr : it.actual_dep)}</td>
            <td>
              <a
                class="track-link"
                href="${flightRadarUrl(it.flight)}"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Track ${it.flight || 'flight'} on Flightradar24"
                title="Track on Flightradar24"
              >✈️</a>
            </td>
          </tr>`).join('');
        return `<div class="narrow"><table><thead><tr><th>Flight</th><th>Airline</th><th>Route</th><th>Status</th><th>Sched ${type === 'arrival' ? 'Arr' : 'Dep'}</th><th>Actual ${type === 'arrival' ? 'Arr' : 'Dep'}</th><th>Track</th></tr></thead><tbody>${body}</tbody></table></div>`;
      }

      function normalizeCounts(summary = {}, kind = 'departure') {
        const raw = summary?.counts || {};
        const statusCounts = summary?.status_counts || {};
        const completedExamples = summary?.completed_examples || [];

        if (raw.in_progress != null) {
          return {
            completed: raw.completed ?? 0,
            in_progress: raw.in_progress ?? 0,
            planned: raw.planned ?? 0,
          };
        }

        // Backward-compat with older data files where "active" was folded into completed
        if (kind === 'departure') {
          const active = statusCounts.active ?? 0;
          const completedActiveRows = completedExamples.filter(x => (x?.status || '').toLowerCase() === 'active').length;
          const inferredInProgress = Math.max(active, completedActiveRows);
          return {
            completed: Math.max(0, (raw.completed ?? 0) - inferredInProgress),
            in_progress: inferredInProgress,
            planned: raw.planned ?? 0,
          };
        }

        return {
          completed: raw.completed ?? 0,
          in_progress: raw.in_progress ?? 0,
          planned: raw.planned ?? 0,
        };
      }

      function sanitizeSearchInput(value) {
        return String(value || '')
          .trim()
          .slice(0, 80)
          .replace(/[<>`"'\\;(){}]/g, ' ')
          .replace(/\s+/g, ' ')
          .toLowerCase();
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function detailsPanel(dayData) {
        const arrDone = dayData?.arrival?.summary?.completed_examples || [];

        const depSummary = dayData?.departure?.summary || {};
        const depDoneRaw = depSummary?.completed_examples || [];
        const depActiveRaw = depSummary?.in_progress_examples || [];
        const depPlanned = depSummary?.planned_examples || [];

        // Backward-compat split for older payloads
        const depDone = depActiveRaw.length
          ? depDoneRaw
          : depDoneRaw.filter(x => (x?.status || '').toLowerCase() !== 'active');
        const depActive = depActiveRaw.length
          ? depActiveRaw
          : depDoneRaw.filter(x => (x?.status || '').toLowerCase() === 'active');

        return `<div class="panel">
          <h4>Arrivals, completed examples</h4>
          ${rows(arrDone, 'arrival')}
          <h4 style="margin-top:12px;">Departures, completed examples</h4>
          ${rows(depDone, 'departure')}
          <h4 style="margin-top:12px;">Departures, in progress examples</h4>
          ${rows(depActive, 'departure')}
          <h4 style="margin-top:12px;">Departures, planned examples</h4>
          ${rows(depPlanned, 'departure')}
        </div>`;
      }

      function refreshFilterOptions(days) {
        const current = dayFilterEl.value || 'all';
        dayFilterEl.innerHTML = '<option value="all">All days</option>' +
          days.map(d => `<option value="${d}">${fmtDay(d)} (${d})</option>`).join('');
        dayFilterEl.value = days.includes(current) ? current : 'all';
      }

      function render(payload) {
        payloadCache = payload;
        const generated = payload.generated_at ? new Date(payload.generated_at).toLocaleString() : 'not generated yet';
        const dayCount = Object.keys(payload.days || {}).length;
        metaEl.textContent = `Airport ${payload.airport || 'TLV'} • Updated ${generated} • ${dayCount} days`;

        const sortedDays = Object.keys(payload.days || {}).sort();
        const order = sortOrderEl.value || 'desc';
        const days = order === 'asc' ? sortedDays : [...sortedDays].reverse();
        refreshFilterOptions(days);

        const filter = dayFilterEl.value || 'all';
        const visibleDays = filter === 'all' ? days : days.filter(d => d === filter);

        if (!visibleDays.length) {
          cardsEl.innerHTML = '<div class="day-card">No data for selected filter.</div>';
          return;
        }

        cardsEl.innerHTML = visibleDays.map(day => {
          const dayData = payload.days[day] || {};
          const arr = dayData.arrival || {};
          const dep = dayData.departure || {};
          const arrS = arr.summary || {};
          const depS = dep.summary || {};
          const arrC = normalizeCounts(arrS, 'arrival');
          const depC = normalizeCounts(depS, 'departure');
          const arrErr = arrS.error ? `<div class="err">Arrival error: ${arrS.error}</div>` : '';
          const depErr = depS.error ? `<div class="err">Departure error: ${depS.error}</div>` : '';
          const isOpen = openDays.has(day);

          return `<section class="day-card" data-day="${day}" role="listitem">
            <div class="day-head">
              <div class="day">${fmtDay(day)} <span class="small">(${day})</span></div>
              <div class="small">arr: ${arr.endpoint_mode || '-'} • dep: ${dep.endpoint_mode || '-'}</div>
            </div>
            <div class="grid2">
              ${metric('Arrivals', arrC.completed, arrC.in_progress, arrC.planned)}
              ${metric('Departures', depC.completed, depC.in_progress, depC.planned)}
            </div>
            <button class="open-btn" data-open-day="${day}">${isOpen ? 'Hide details' : 'Show flight details'}</button>
            ${isOpen ? detailsPanel(dayData) : ''}
            ${arrErr}${depErr}
          </section>`;
        }).join('');

        document.querySelectorAll('[data-open-day]').forEach(btn => {
          btn.addEventListener('click', () => {
            const day = btn.getAttribute('data-open-day');
            if (openDays.has(day)) openDays.delete(day); else openDays.add(day);
            render(payloadCache);
          });
        });
      }

      function collectSearchRows(payload) {
        const out = [];
        for (const [day, dayData] of Object.entries(payload?.days || {})) {
          for (const type of ['arrival', 'departure']) {
            const summary = dayData?.[type]?.summary || {};
            for (const bucket of ['completed_examples', 'in_progress_examples', 'planned_examples']) {
              for (const row of summary?.[bucket] || []) {
                out.push({ day, type, bucket, row });
              }
            }
          }
        }
        return out;
      }

      function runSearch() {
        if (!payloadCache) return;
        const qRaw = flightSearchEl.value || '';
        const q = sanitizeSearchInput(qRaw);

        if (!q) {
          searchResultsEl.style.display = 'none';
          searchResultsEl.innerHTML = '';
          return;
        }

        const allRows = collectSearchRows(payloadCache);
        const matches = allRows.filter(({ row }) => {
          const flight = String(row?.flight || '').toLowerCase();
          const airline = String(row?.airline || '').toLowerCase();
          return flight.includes(q) || airline.includes(q);
        });

        const byDay = new Map();
        for (const m of matches) {
          if (!byDay.has(m.day)) byDay.set(m.day, []);
          byDay.get(m.day).push(m);
        }

        if (!matches.length) {
          searchResultsEl.style.display = 'block';
          searchResultsEl.innerHTML = `<div class="day"><strong>NOT FOUND</strong></div><div class="small" style="margin-top:6px;">No flight or airline matched "${escapeHtml(qRaw)}"</div>`;
          return;
        }

        const sections = Array.from(byDay.entries())
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(([day, rowsForDay]) => {
            const body = rowsForDay.map(({ type, row }) => `<tr>
              <td>${escapeHtml(row.flight || 'n/a')}</td>
              <td>${escapeHtml(row.airline || 'n/a')}</td>
              <td>${escapeHtml(type)}</td>
              <td>${escapeHtml(humanStatus(row.status || 'unknown'))}</td>
              <td>${escapeHtml((row.dep || '---') + ' → ' + (row.arr || '---'))}</td>
              <td>${escapeHtml(type === 'arrival' ? (row.scheduled_arr || 'n/a') : (row.scheduled_dep || 'n/a'))}</td>
              <td><a class="track-link" href="${flightRadarUrl(row.flight)}" target="_blank" rel="noopener noreferrer" title="Track on Flightradar24">✈️</a></td>
            </tr>`).join('');
            return `<h4 style="margin:10px 0 6px 0;">${escapeHtml(day)} • ${rowsForDay.length} match(es)</h4>
              <div class="narrow"><table><thead><tr><th>Flight</th><th>Airline</th><th>Type</th><th>Status</th><th>Route</th><th>Scheduled</th><th>Track</th></tr></thead><tbody>${body}</tbody></table></div>`;
          }).join('');

        searchResultsEl.style.display = 'block';
        searchResultsEl.innerHTML = `<div class="day"><strong>Found ${matches.length}</strong> result(s) for "${escapeHtml(qRaw)}"</div>${sections}`;
      }

      async function loadData() {
        const res = await fetch(dataUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error(`failed to load data (${res.status})`);
        render(await res.json());
      }

      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      async function refreshData() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Refreshing...';
        try {
          const res = await fetch(refreshEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from: 'web' })
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || `refresh failed (${res.status})`);

          refreshBtn.textContent = 'Refreshed!';
          await loadData().catch(() => {});
          await sleep(5000);
        } catch (e) {
          alert(e.message || 'refresh failed');
        } finally {
          refreshBtn.disabled = false;
          refreshBtn.textContent = 'Refresh now';
        }
      }

      refreshBtn.addEventListener('click', refreshData);
      dayFilterEl.addEventListener('change', () => payloadCache && render(payloadCache));
      sortOrderEl.addEventListener('change', () => payloadCache && render(payloadCache));
      searchBtnEl.addEventListener('click', runSearch);
      flightSearchEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          runSearch();
        }
      });

      loadData().catch(err => {
        metaEl.textContent = 'Failed to load data';
        cardsEl.innerHTML = `<div class="day-card err">${err.message}</div>`;
      });
    </script>
  </body>
</html>
