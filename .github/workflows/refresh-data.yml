name: Refresh flights data

on:
  workflow_dispatch:
    inputs:
      reason:
        description: why refresh was triggered
        required: false
        default: manual
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch latest flights
        env:
          AVIATION_EDGE_API_KEY: ${{ secrets.AVIATION_EDGE_API_KEY }}
          AIRPORT_IATA: TLV
          LOOKBACK_DAYS: 7
          AIRPORT_TZ: Asia/Jerusalem
        run: python scripts/fetch_flights.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flights.json
          if git diff --staged --quiet; then
            echo "No data change"
            exit 0
          fi
          git commit -m "chore: refresh flights data"
          git push
