name: Refresh flights data

on:
  workflow_dispatch:
    inputs:
      reason:
        description: why refresh was triggered
        required: false
        default: manual
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch latest flights
        env:
          AVIATION_EDGE_API_KEY: ${{ secrets.AVIATION_EDGE_API_KEY }}
          AIRPORT_IATA: TLV
          LOOKBACK_DAYS: 7
          AIRPORT_TZ: Asia/Jerusalem
        run: python scripts/fetch_flights.py

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flights.json
          if git diff --staged --quiet; then
            echo "No data change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: refresh flights data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy_pages:
    name: Deploy refreshed data to GitHub Pages
    runs-on: ubuntu-latest
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp favicon.svg _site/favicon.svg
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
